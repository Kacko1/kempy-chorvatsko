name: Aktualizace mapových dat

on:
  schedule:
    - cron: "17 3 * * 1"
      timezone: "Europe/Prague"
  workflow_dispatch:

concurrency:
  group: update-map-data
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-country:
    name: Zpracování – ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - country: cz
            label: Česko
            file: cesko_data.json
          - country: hr
            label: Chorvatsko
            file: chorvatsko_data.json
          - country: it
            label: Itálie
            file: italie_data.json
          - country: de
            label: Německo
            file: nemecko_data.json
          - country: pl
            label: Polsko
            file: polsko_data.json
          - country: at
            label: Rakousko
            file: rakousko_data.json
          - country: sk
            label: Slovensko
            file: slovensko_data.json
          - country: si
            label: Slovinsko
            file: slovinsko_data.json
          - country: ch
            label: Švýcarsko
            file: svycarsko_data.json

    steps:
      - name: Načtení repozitáře
        uses: actions/checkout@v6

      - name: Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Instalace komprese JSON
        run: npm install --no-save --ignore-scripts --no-audit --no-fund lz-string@1.5.0

      - name: Instalace nástroje Osmium
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends osmium-tool

      - name: Kontrola generátoru
        run: node scripts/update-map-data-geofabrik.mjs --check

      - name: Stažení a zpracování výřezů Geofabrik
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          GEOFABRIK_TIMEOUT_MS: "3600000"
          GEOFABRIK_MAX_ATTEMPTS: "3"
        run: node scripts/update-map-data-geofabrik.mjs --countries "${{ matrix.country }}"

      - name: Předání výsledku
        uses: actions/upload-artifact@v7
        with:
          name: map-data-${{ matrix.country }}
          path: ${{ matrix.file }}
          if-no-files-found: error
          retention-days: 1

  update-data:
    name: Uložení všech zemí
    needs: build-country
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Načtení repozitáře
        uses: actions/checkout@v6

      - name: Stažení výsledků všech zemí
        uses: actions/download-artifact@v8
        with:
          pattern: map-data-*
          path: .
          merge-multiple: true

      - name: Uložení změněných JSON souborů
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- cesko_data.json chorvatsko_data.json italie_data.json nemecko_data.json polsko_data.json rakousko_data.json slovensko_data.json slovinsko_data.json svycarsko_data.json)" ]]; then
            echo "JSON soubory se nezměnily."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- cesko_data.json chorvatsko_data.json italie_data.json nemecko_data.json polsko_data.json rakousko_data.json slovensko_data.json slovinsko_data.json svycarsko_data.json
          git commit -m "Automatická aktualizace mapových dat"
          git push
