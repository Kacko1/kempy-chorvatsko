name: Aktualizace mapových dat

on:
  schedule:
    - cron: "17 3 * * 1"
      timezone: "Europe/Prague"
  workflow_dispatch:

concurrency:
  group: update-map-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Načtení repozitáře
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalace komprese JSON
        run: npm install --no-save --ignore-scripts --no-audit --no-fund lz-string@1.5.0

      - name: Kontrola generátoru
        run: node scripts/update-map-data.mjs --check

      - name: Stažení všech zemí
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          OVERPASS_DELAY_MS: "20000"
          OVERPASS_RETRY_MS: "20000"
          OVERPASS_TIMEOUT_MS: "210000"
          OVERPASS_MAX_ATTEMPTS: "3"
        run: node scripts/update-map-data.mjs

      - name: Uložení změněných JSON souborů
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- cesko_data.json rakousko_data.json slovinsko_data.json chorvatsko_data.json)" ]]; then
            echo "JSON soubory se nezměnily."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- cesko_data.json rakousko_data.json slovinsko_data.json chorvatsko_data.json
          git commit -m "Automatická aktualizace mapových dat"
          git push
