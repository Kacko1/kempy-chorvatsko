name: Aktualizace mapových dat

on:
  schedule:
    - cron: "17 3 * * 1"
      timezone: "Europe/Prague"
  workflow_dispatch:

concurrency:
  group: update-map-data
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare-data-branch:
    name: Příprava datové větve
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Načtení hlavní větve
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Vytvoření větve data při prvním spuštění
        shell: bash
        env:
          DATA_BRANCH: data
        run: |
          if git ls-remote --exit-code --heads origin "refs/heads/$DATA_BRANCH" >/dev/null 2>&1; then
            echo "Datová větev už existuje."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          export GIT_INDEX_FILE="$RUNNER_TEMP/data-branch-index"
          rm -f "$GIT_INDEX_FILE"
          git read-tree --empty

          seed_paths=(
            cesko_data.json chorvatsko_data.json italie_data.json
            nemecko_data.json polsko_data.json rakousko_data.json
            slovensko_data.json slovinsko_data.json svycarsko_data.json
            map-data
          )
          existing_paths=()
          for item in "${seed_paths[@]}"; do
            if [[ -e "$item" ]]; then existing_paths+=("$item"); fi
          done
          if ((${#existing_paths[@]} > 0)); then
            git add -- "${existing_paths[@]}"
          fi

          data_tree=$(git write-tree)
          data_commit=$(printf '%s\n' "Inicializace aktuálních mapových dat" | git commit-tree "$data_tree")
          git push origin "$data_commit:refs/heads/$DATA_BRANCH"

  build-country:
    name: Zpracování – ${{ matrix.label }}
    needs: prepare-data-branch
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - country: al
            label: Albánie
            file: albanie_data.json
            data_dir: map-data/albanie
          - country: ad
            label: Andorra
            file: andorra_data.json
            data_dir: map-data/andorra
          - country: be
            label: Belgie
            file: belgie_data.json
            data_dir: map-data/belgie
          - country: by
            label: Bělorusko
            file: belorusko_data.json
            data_dir: map-data/belorusko
          - country: ba
            label: Bosna a Hercegovina
            file: bosna-a-hercegovina_data.json
            data_dir: map-data/bosna-a-hercegovina
          - country: bg
            label: Bulharsko
            file: bulharsko_data.json
            data_dir: map-data/bulharsko
          - country: me
            label: Černá Hora
            file: cerna-hora_data.json
            data_dir: map-data/cerna-hora
          - country: cz
            label: Česko
            file: cesko_data.json
            data_dir: map-data/cesko
          - country: dk
            label: Dánsko
            file: dansko_data.json
            data_dir: map-data/dansko
          - country: ee
            label: Estonsko
            file: estonsko_data.json
            data_dir: map-data/estonsko
          - country: fi
            label: Finsko
            file: finsko_data.json
            data_dir: map-data/finsko
          - country: fr
            label: Francie
            file: francie_data.json
            data_dir: map-data/francie
          - country: ge
            label: Gruzie
            file: gruzie_data.json
            data_dir: map-data/gruzie
          - country: hr
            label: Chorvatsko
            file: chorvatsko_data.json
            data_dir: map-data/chorvatsko
          - country: ie
            label: Irsko
            file: irsko_data.json
            data_dir: map-data/irsko
          - country: is
            label: Island
            file: island_data.json
            data_dir: map-data/island
          - country: it
            label: Itálie
            file: italie_data.json
            data_dir: map-data/italie
          - country: xk
            label: Kosovo
            file: kosovo_data.json
            data_dir: map-data/kosovo
          - country: cy
            label: Kypr
            file: kypr_data.json
            data_dir: map-data/kypr
          - country: li
            label: Lichtenštejnsko
            file: lichtenstejnsko_data.json
            data_dir: map-data/lichtenstejnsko
          - country: lt
            label: Litva
            file: litva_data.json
            data_dir: map-data/litva
          - country: lv
            label: Lotyšsko
            file: lotyssko_data.json
            data_dir: map-data/lotyssko
          - country: lu
            label: Lucembursko
            file: lucembursko_data.json
            data_dir: map-data/lucembursko
          - country: hu
            label: Maďarsko
            file: madarsko_data.json
            data_dir: map-data/madarsko
          - country: mt
            label: Malta
            file: malta_data.json
            data_dir: map-data/malta
          - country: md
            label: Moldavsko
            file: moldavsko_data.json
            data_dir: map-data/moldavsko
          - country: mc
            label: Monako
            file: monako_data.json
            data_dir: map-data/monako
          - country: de
            label: Německo
            file: nemecko_data.json
            data_dir: map-data/nemecko
          - country: nl
            label: Nizozemsko
            file: nizozemsko_data.json
            data_dir: map-data/nizozemsko
          - country: no
            label: Norsko
            file: norsko_data.json
            data_dir: map-data/norsko
          - country: pl
            label: Polsko
            file: polsko_data.json
            data_dir: map-data/polsko
          - country: pt
            label: Portugalsko
            file: portugalsko_data.json
            data_dir: map-data/portugalsko
          - country: at
            label: Rakousko
            file: rakousko_data.json
            data_dir: map-data/rakousko
          - country: ro
            label: Rumunsko
            file: rumunsko_data.json
            data_dir: map-data/rumunsko
          - country: gr
            label: Řecko
            file: recko_data.json
            data_dir: map-data/recko
          - country: mk
            label: Severní Makedonie
            file: severni-makedonie_data.json
            data_dir: map-data/severni-makedonie
          - country: sk
            label: Slovensko
            file: slovensko_data.json
            data_dir: map-data/slovensko
          - country: si
            label: Slovinsko
            file: slovinsko_data.json
            data_dir: map-data/slovinsko
          - country: gb
            label: Spojené království
            file: spojene-kralovstvi_data.json
            data_dir: map-data/spojene-kralovstvi
          - country: rs
            label: Srbsko
            file: srbsko_data.json
            data_dir: map-data/srbsko
          - country: es
            label: Španělsko
            file: spanelsko_data.json
            data_dir: map-data/spanelsko
          - country: se
            label: Švédsko
            file: svedsko_data.json
            data_dir: map-data/svedsko
          - country: ch
            label: Švýcarsko
            file: svycarsko_data.json
            data_dir: map-data/svycarsko
          - country: tr
            label: Turecko
            file: turecko_data.json
            data_dir: map-data/turecko
          - country: ua
            label: Ukrajina
            file: ukrajina_data.json
            data_dir: map-data/ukrajina

    steps:
      - name: Načtení repozitáře
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Instalace nástroje Osmium
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends osmium-tool

      - name: Kontrola generátoru
        run: node scripts/update-map-data-geofabrik.mjs --check

      - name: Stažení a zpracování výřezů Geofabrik
        id: generate
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          GEOFABRIK_TIMEOUT_MS: "3600000"
          GEOFABRIK_MAX_ATTEMPTS: "3"
        run: node scripts/update-map-data-geofabrik.mjs --countries "${{ matrix.country }}"

      - name: Okamžité uložení dat země
        shell: bash
        env:
          DATA_FILE: ${{ matrix.file }}
          DATA_DIR: ${{ matrix.data_dir }}
          COUNTRY_LABEL: ${{ matrix.label }}
          COUNTRY_ID: ${{ matrix.country }}
          DATA_BRANCH: data
        run: |
          if [[ ! -f "$DATA_FILE" || ! -d "$DATA_DIR" ]]; then
            echo "$COUNTRY_LABEL: generátor nevytvořil kompletní výsledek."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for attempt in 1 2 3 4 5 6 7 8; do
            git fetch --no-tags --filter=blob:none origin \
              "+refs/heads/$DATA_BRANCH:refs/remotes/origin/$DATA_BRANCH"

            export GIT_INDEX_FILE="$RUNNER_TEMP/data-index-$COUNTRY_ID"
            rm -f "$GIT_INDEX_FILE"
            git read-tree "origin/$DATA_BRANCH"
            git add -- "$DATA_FILE" "$DATA_DIR"

            data_tree=$(git write-tree)
            data_parent=$(git rev-parse "origin/$DATA_BRANCH")
            data_commit=$(printf '%s\n' "Aktualizace dat: $COUNTRY_LABEL" \
              | git commit-tree "$data_tree" -p "$data_parent")

            if git push origin "$data_commit:refs/heads/$DATA_BRANCH"; then
              echo "$COUNTRY_LABEL: manifest i gzip části jsou bezpečně ve větvi $DATA_BRANCH."
              exit 0
            fi
            echo "$COUNTRY_LABEL: jiná země právě aktualizovala datovou větev, opakuji pokus $attempt/8."
            sleep $((attempt * 5))
          done

          echo "$COUNTRY_LABEL: data se nepodařilo uložit ani po osmi pokusech."
          exit 1

  squash-data-history:
    name: Zachování pouze aktuální datové sady
    needs: build-country
    # Každá úspěšná země už je ve větvi data. I při selhání jiné země proto
    # pouze odstraníme rodiče commitů a zachováme aktuální výsledný strom.
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Načtení pracovního repozitáře
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - name: Sloučení historie datové větve na jeden stav
        shell: bash
        env:
          DATA_BRANCH: data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags --filter=blob:none origin \
            "+refs/heads/$DATA_BRANCH:refs/remotes/origin/$DATA_BRANCH"

          data_parent=$(git rev-parse "origin/$DATA_BRANCH")
          data_tree=$(git rev-parse "origin/$DATA_BRANCH^{tree}")
          data_commit=$(printf '%s\n' "Aktuální mapová data $(date -u +%Y-%m-%d)" \
            | git commit-tree "$data_tree")

          git push \
            --force-with-lease="refs/heads/$DATA_BRANCH:$data_parent" \
            origin "$data_commit:refs/heads/$DATA_BRANCH"
          echo "Datová větev obsahuje jediný aktuální stav bez starých gzip verzí."

  cleanup-main-data:
    name: Odstranění datových kopií z hlavní větve
    needs: [build-country, squash-data-history]
    if: ${{ always() && !cancelled() && needs.build-country.result == 'success' && needs.squash-data-history.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Načtení hlavní větve
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - name: Kontrola úplnosti datové větve
        shell: bash
        env:
          DATA_BRANCH: data
        run: |
          git fetch --no-tags --filter=blob:none origin \
            "+refs/heads/$DATA_BRANCH:refs/remotes/origin/$DATA_BRANCH"
          country_paths=(
            albanie andorra belgie belorusko bosna-a-hercegovina bulharsko
            cerna-hora cesko dansko estonsko finsko francie gruzie chorvatsko
            irsko island italie kosovo kypr lichtenstejnsko litva lotyssko
            lucembursko madarsko malta moldavsko monako nemecko nizozemsko
            norsko polsko portugalsko rakousko rumunsko recko severni-makedonie
            slovensko slovinsko spojene-kralovstvi srbsko spanelsko svedsko
            svycarsko turecko ukrajina
          )
          for country_path in "${country_paths[@]}"; do
            for item in "${country_path}_data.json" "map-data/$country_path"; do
              if git cat-file -e "origin/$DATA_BRANCH:$item"; then
                continue
              fi
              echo "Datová větev není úplná, v hlavní větvi proto nic nemažu: $item"
              exit 1
            done
          done
          echo "Datová větev obsahuje všech 45 zemí."

      - name: Uvolnění hlavní větve od velkých dat
        shell: bash
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -r --ignore-unmatch -- map-data
          git rm --ignore-unmatch -- '*_data.json'

          if git diff --cached --quiet; then
            echo "Hlavní větev už neobsahuje velké datové soubory."
            exit 0
          fi

          git commit -m "Přesun aktuálních mapových dat do větve data"
          for attempt in 1 2 3 4 5; do
            git fetch origin "$TARGET_BRANCH"
            if ! git rebase "origin/$TARGET_BRANCH"; then
              git rebase --abort || true
              echo "Úklid hlavní větve nelze bezpečně sloučit."
              exit 1
            fi
            if git push origin "HEAD:$TARGET_BRANCH"; then
              echo "Hlavní větev je malá; web načítá aktuální data z větve data."
              exit 0
            fi
            sleep $((attempt * 5))
          done

          echo "Úklid hlavní větve se nepodařilo uložit."
          exit 1
