name: Aktualizace mapových dat

on:
  schedule:
    - cron: "17 3 * * 1"
      timezone: "Europe/Prague"
  workflow_dispatch:

concurrency:
  group: update-map-data
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-country:
    name: Zpracování – ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 240
    permissions:
      contents: write
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - country: cz
            label: Česko
            file: cesko_data.json
          - country: hr
            label: Chorvatsko
            file: chorvatsko_data.json
          - country: it
            label: Itálie
            file: italie_data.json
          - country: de
            label: Německo
            file: nemecko_data.json
          - country: pl
            label: Polsko
            file: polsko_data.json
          - country: at
            label: Rakousko
            file: rakousko_data.json
          - country: sk
            label: Slovensko
            file: slovensko_data.json
          - country: si
            label: Slovinsko
            file: slovinsko_data.json
          - country: ch
            label: Švýcarsko
            file: svycarsko_data.json

    steps:
      - name: Načtení repozitáře
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Instalace nástroje Osmium
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends osmium-tool

      - name: Kontrola generátoru
        run: node scripts/update-map-data-geofabrik.mjs --check

      - name: Stažení a zpracování výřezů Geofabrik
        id: generate
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          GEOFABRIK_TIMEOUT_MS: "3600000"
          GEOFABRIK_MAX_ATTEMPTS: "3"
        run: node scripts/update-map-data-geofabrik.mjs --countries "${{ matrix.country }}"

      - name: Okamžité uložení JSONu země
        shell: bash
        env:
          DATA_FILE: ${{ matrix.file }}
          COUNTRY_LABEL: ${{ matrix.label }}
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          if [[ -z "$(git status --porcelain -- "$DATA_FILE")" ]]; then
            echo "$COUNTRY_LABEL: JSON se nezměnil."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "$DATA_FILE"
          git commit -m "Automatická aktualizace: $COUNTRY_LABEL"

          for attempt in 1 2 3 4 5; do
            git fetch origin "$TARGET_BRANCH"
            if ! git rebase "origin/$TARGET_BRANCH"; then
              git rebase --abort || true
              echo "$COUNTRY_LABEL: změnu nelze bezpečně sloučit s aktuální větví."
              exit 1
            fi
            if git push origin "HEAD:$TARGET_BRANCH"; then
              echo "$COUNTRY_LABEL: JSON byl uložen do repozitáře."
              exit 0
            fi
            echo "$COUNTRY_LABEL: souběžný push, opakuji pokus $attempt/5."
            sleep $((attempt * 5))
          done

          echo "$COUNTRY_LABEL: JSON se nepodařilo pushnout ani po pěti pokusech."
          exit 1

      # Artefakt je záloha pro závěrečný krok. Vytvoří se i tehdy, když se
      # okamžitý push nepodařil, ale samotné zpracování země bylo úspěšné.
      - name: Předání výsledku jako zálohy
        if: ${{ always() && steps.generate.outcome == 'success' }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: map-data-${{ matrix.country }}
          path: ${{ matrix.file }}
          if-no-files-found: error
          retention-days: 1

  update-data:
    name: Kontrola a uložení zbývajících výsledků
    needs: build-country
    # Selhání jedné země nesmí zahodit JSONy ostatních. Při ručním zrušení
    # běhu ale nedokončené výsledky záměrně neukládáme.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Načtení repozitáře
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Stažení výsledků úspěšných zemí
        uses: actions/download-artifact@v8
        with:
          pattern: map-data-*
          path: .
          merge-multiple: true

      - name: Uložení změněných JSON souborů
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- cesko_data.json chorvatsko_data.json italie_data.json nemecko_data.json polsko_data.json rakousko_data.json slovensko_data.json slovinsko_data.json svycarsko_data.json)" ]]; then
            echo "JSON soubory se nezměnily."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- cesko_data.json chorvatsko_data.json italie_data.json nemecko_data.json polsko_data.json rakousko_data.json slovensko_data.json slovinsko_data.json svycarsko_data.json
          echo "Ukládám tyto změněné JSONy:"
          git status --short -- cesko_data.json chorvatsko_data.json italie_data.json nemecko_data.json polsko_data.json rakousko_data.json slovensko_data.json slovinsko_data.json svycarsko_data.json

          git commit -m "Automatická aktualizace dostupných mapových dat"
          git push
